<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Rubicon Nexus</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0b1020;--ink:#f4f6fb;--muted:#9aa6c2;--brand:#6d5cff;--brand2:#a855f7;--accent:#22d3ee;--line:rgba(255,255,255,.10);--card:rgba(255,255,255,.04)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;overflow:hidden;-webkit-font-smoothing:antialiased}
    .glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(60vw 60vw at 75% -10%,rgba(124,92,255,.22),transparent 60%),radial-gradient(50vw 50vw at 0% 100%,rgba(233,69,96,.18),transparent 55%)}
    .box{position:relative;z-index:1;max-width:520px}
    .mark{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-family:'Sora';font-weight:800;color:#fff;margin:0 auto 28px;background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 8px 24px rgba(124,92,255,.35)}
    .code{font-family:'Sora';font-weight:800;font-size:clamp(3.5rem,12vw,6rem);line-height:1;letter-spacing:-.03em;background:linear-gradient(90deg,var(--brand),var(--brand2) 60%,var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    h1{font-family:'Sora';font-weight:700;font-size:1.4rem;margin:14px 0 10px}
    p{color:var(--muted);margin-bottom:28px}
    a.btn{display:inline-block;font-weight:600;padding:14px 26px;border-radius:999px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 12px 30px rgba(124,92,255,.3);text-decoration:none;transition:.25s}
    a.btn:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(124,92,255,.42)}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="box">
    <div class="mark">RN</div>
    <div class="code">404</div>
    <h1>This connection doesn't exist… yet.</h1>
    <p>The page you're looking for isn't here. Let's get you back to the nexus.</p>
    <a class="btn" href="/">Back to home</a>
  </div>
</body>
</html>
