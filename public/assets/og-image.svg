<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d5cff"/>
      <stop offset="0.6" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d5cff"/>
      <stop offset="0.6" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow1" cx="78%" cy="-8%" r="70%">
      <stop offset="0" stop-color="#6d5cff" stop-opacity="0.40"/>
      <stop offset="60%" stop-color="#6d5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0%" cy="108%" r="70%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0b1020"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- mark + wordmark -->
  <g transform="translate(96,150)">
    <rect width="96" height="96" rx="24" fill="url(#mark)"/>
    <text x="48" y="48" dy="0.36em" text-anchor="middle"
          font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800"
          font-size="44" fill="#ffffff" letter-spacing="-1">RN</text>
    <text x="128" y="48" dy="0.36em"
          font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700"
          font-size="40" fill="#f4f6fb" letter-spacing="-0.5">Rubicon Nexus</text>
  </g>

  <!-- headline -->
  <text x="96" y="358" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="74" letter-spacing="-2.5" fill="#f4f6fb">Where connections</text>
  <text x="96" y="448" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="74" letter-spacing="-2.5" fill="url(#word)">converge.</text>

  <!-- subline -->
  <text x="98" y="528" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="500" font-size="27" fill="#9aa6c2">The connection point for people, data &amp; decisions.</text>

  <!-- url -->
  <text x="1104" y="568" text-anchor="end" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="600" font-size="26" fill="#22d3ee">rubiconnexus.com</text>
</svg>
